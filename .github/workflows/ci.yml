name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vite-plus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          run-install: |
            args: ['--frozen-lockfile']
          cache: true

      - name: Check formatting, lint and types
        run: vp check
